name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install root dependencies
      run: npm install

    - name: Lint root
      run: npm run lint

    - name: Backend - Install dependencies
      run: |
        cd server
        npm install

    - name: Backend - Run tests
      run: |
        cd server
        npm test
      env:
        NODE_ENV: test
        JWT_SECRET: test_secret_key_12345678901234567890
